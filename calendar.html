<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Calendar | International Student App</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        /* Flatpickr farblich an dein Smaragdgrün anpassen */
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange, .flatpickr-day.selected.inRange, .flatpickr-day.startRange.inRange, .flatpickr-day.endRange.inRange, .flatpickr-day.selected:focus, .flatpickr-day.startRange:focus, .flatpickr-day.endRange:focus, .flatpickr-day.selected:hover, .flatpickr-day.startRange:hover, .flatpickr-day.endRange:hover, .flatpickr-day.nextMonthDay.selected, .flatpickr-day.nextMonthDay.startRange, .flatpickr-day.nextMonthDay.endRange, .flatpickr-day.nextMonthDay.selected.inRange, .flatpickr-day.nextMonthDay.startRange.inRange, .flatpickr-day.nextMonthDay.endRange.inRange, .flatpickr-day.nextMonthDay.selected:focus, .flatpickr-day.nextMonthDay.startRange:focus, .flatpickr-day.nextMonthDay.endRange:focus, .flatpickr-day.nextMonthDay.selected:hover, .flatpickr-day.nextMonthDay.startRange:hover, .flatpickr-day.nextMonthDay.endRange:hover {
            background: #003527 !important;
            border-color: #003527 !important;
        }
        .flatpickr-day.inRange {
            background: rgba(0, 53, 39, 0.1) !important;
            box-shadow: -5px 0 0 rgba(0, 53, 39, 0.1), 5px 0 0 rgba(0, 53, 39, 0.1) !important;
        }
        .flatpickr-calendar {
            max-width: 100% !important;
            width: 100% !important;
        }
        @media (min-width: 640px) {
            .flatpickr-calendar {
                max-width: 307.5px !important; /* Standard-Flatpickr-Breite */
                width: auto !important;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                    "primary": "#003527", 
                    "primary-container": "#064e3b", 
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#404944", 
                    "outline-variant": "#bfc9c3",
                    "error": "#ba1a1a"
                },
                "fontFamily": { 
                    "body-md": ["Inter"], 
                    "headline-md": ["Montserrat"] 
                }
              }
            }
          }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { display: none; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#f7f9fb] text-on-surface font-body-md min-h-screen flex flex-col antialiased">

<header class="w-full flex justify-between items-center px-4 md:px-16 py-4 bg-white border-b border-outline-variant">
    <div class="flex items-center gap-4">
        <span class="font-headline-md text-base md:text-xl font-bold text-primary tracking-tight whitespace-nowrap">International Students App</span>
    </div>
    
    <div class="flex items-center gap-3 md:gap-6">
        <a href="index.html" class="text-xs md:text-sm font-medium text-on-surface-variant hover:text-primary flex items-center gap-1 transition-colors min-h-[44px]">
            <span class="material-symbols-outlined text-base md:text-lg">arrow_back</span>
            <span data-translate="back_to_dashboard" class="hidden sm:inline">Back to Dashboard</span>
        </a>
        <div id="currentLanguageLabel" class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-on-surface-variant bg-slate-100 border border-slate-200 px-2 md:px-2.5 py-1 rounded-lg cursor-pointer hover:bg-slate-200 hover:text-primary transition-all min-h-[32px] flex items-center">
            --
        </div>
        <span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary p-1 min-h-[44px] flex items-center text-xl md:text-2xl">account_circle</span>
    </div>
</header>

<main class="flex-1 max-w-6xl w-full mx-auto px-4 md:px-6 pt-6 md:pt-12 flex flex-col lg:flex-row gap-6 md:gap-8">
    
    <div class="w-full lg:w-1/3 space-y-4">
        <div class="bg-white border border-outline-variant/60 rounded-xl p-4 md:p-5 shadow-sm lg:sticky lg:top-6">
            <div class="flex justify-between items-center mb-4">
                <button id="prevMonthBtn" class="p-2 hover:text-primary transition-colors min-h-[44px] flex items-center justify-center">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <h2 id="calendarMonthYear" class="font-headline-md text-sm md:text-base font-bold text-primary uppercase tracking-wider text-center flex-1">June 2026</h2>
                <button id="nextMonthBtn" class="p-2 hover:text-primary transition-colors min-h-[44px] flex items-center justify-center">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
            
            <div class="grid grid-cols-7 text-center text-[11px] font-bold text-on-surface-variant/70 mb-2 gap-y-2">
                <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
            
            <div id="calendarDaysGrid" class="grid grid-cols-7 text-center text-xs md:text-sm gap-y-2 md:gap-y-3 font-medium"></div>

            <div class="mt-4 pt-3 border-t border-outline-variant/40 text-center">
                <button id="clearFilterBtn" class="text-xs text-primary hover:underline font-semibold hidden min-h-[36px]" data-translate="clear_filter">Show All Events</button>
            </div>
        </div>
    </div>

    <div class="w-full lg:w-2/3 space-y-4 md:space-y-6">
        <div class="flex justify-between items-center border-b border-outline-variant pb-4 gap-2">
            <h1 class="font-headline-md text-xl md:text-3xl font-bold text-primary truncate" data-translate="page_title">Event Calendar</h1>
            <button id="addEventBtn" class="hidden bg-primary hover:bg-primary-container text-white px-3 md:px-4 py-2 rounded-lg text-xs md:text-sm font-medium flex items-center gap-1.5 md:gap-2 transition-colors shadow-sm min-h-[40px] shrink-0">
                <span class="material-symbols-outlined text-sm md:text-base">calendar_add_on</span>
                <span data-translate="btn_add">Add Event</span>
            </button>
        </div>

        <div id="eventsContainer" class="space-y-4"></div>
    </div>
</main>

<div id="eventModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all">
    <div class="bg-white rounded-t-2xl sm:rounded-xl border-t sm:border border-outline-variant max-w-lg w-full p-5 md:p-6 shadow-xl space-y-4 max-h-[92vh] sm:max-h-[90vh] overflow-y-auto animate-in slide-in-from-bottom sm:slide-in-from-bottom-0 duration-200">
        <div class="flex justify-between items-center border-b pb-2 sm:border-0 sm:pb-0">
            <h2 id="modalTitle" class="font-headline-md text-lg md:text-xl font-bold text-primary" data-translate="modal_add_title">Add New Event</h2>
            <button id="closeModalMobileBtn" class="sm:hidden p-2 text-on-surface-variant hover:text-on-surface min-h-[44px]">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[11px] font-semibold text-on-surface-variant uppercase mb-1" data-translate="label_heading">Event Title</label>
                <input type="text" id="inputTitle" class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-primary text-sm min-h-[40px]" data-translate-placeholder="placeholder_heading" placeholder="Write event title here...">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-on-surface-variant uppercase mb-1.5">Event Duration Type</label>
                <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-6 bg-gray-50 p-3 rounded-lg border border-outline-variant/40">
                    <label class="flex items-center gap-3 text-sm text-on-surface font-medium cursor-pointer min-h-[36px] sm:min-h-0">
                        <input type="radio" name="dateType" value="single" checked class="w-5 h-5 sm:w-4 sm:h-4 text-primary focus:ring-primary border-outline-variant">
                        <span>Single Time / Day</span>
                    </label>
                    <label class="flex items-center gap-3 text-sm text-on-surface font-medium cursor-pointer min-h-[36px] sm:min-h-0">
                        <input type="radio" name="dateType" value="range" class="w-5 h-5 sm:w-4 sm:h-4 text-primary focus:ring-primary border-outline-variant">
                        <span>Date & Time Range</span>
                    </label>
                </div>
            </div>
            
            <div>
                <label id="datePickerLabel" class="block text-[11px] font-semibold text-on-surface-variant uppercase mb-1">Select Date & Time</label>
                <div class="relative sm:max-w-md">
                    <input type="text" id="flatpickrInput" class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-primary text-sm bg-white cursor-pointer min-h-[40px]" placeholder="Click to choose..." readonly>
                    <span class="material-symbols-outlined absolute right-3 top-2.5 text-on-surface-variant/60 pointer-events-none text-xl">calendar_today</span>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-on-surface-variant uppercase mb-1" data-translate="label_content">Description</label>
                <textarea id="inputText" rows="4" class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-primary text-sm p-3" data-translate-placeholder="placeholder_content" placeholder="Write the event description details here..."></textarea>
            </div>
        </div>

        <div class="flex flex-col-reverse sm:flex-row justify-end gap-2 sm:gap-3 pt-2 border-t sm:border-0">
            <button id="closeModalBtn" class="w-full sm:w-auto px-4 py-2.5 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors min-h-[44px] flex items-center justify-center" data-translate="btn_cancel">Cancel</button>
            <button id="saveEventBtn" class="w-full sm:w-auto bg-primary hover:bg-primary-container text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors min-h-[44px] flex items-center justify-center shadow-sm" data-translate="btn_save">Save Event</button>
        </div>
    </div>
</div>

<footer class="w-full py-6 md:py-8 text-center text-[11px] text-on-surface-variant/70 space-y-1 mt-auto border-t border-gray-100">
    <p class="font-semibold">© 2026 Westland High School</p>
    <p>Hokitika, New Zealand</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBZVrxD26WJDlK5_zB3LOMX32l6BzlC34Y",
        authDomain: "whsinternational.firebaseapp.com",
        projectId: "whsinternational",
        storageBucket: "whsinternational.firebasestorage.app",
        messagingSenderId: "940437937286",
        appId: "1:940437937286:web:06c74c7e287e50b511c507",
        measurementId: "G-W6P03BPPV7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // KORREKTUR: Einheitlicher Key 'userLanguage'
    let currentLang = localStorage.getItem('userLanguage') || 'en';
    let userRole = localStorage.getItem('userRole') || 'student';
    let isAdmin = (userRole === 'admin');

    const uiMaster = {
        back_to_dashboard: "Back to Dashboard",
        back_to_dashboard_short: "",
        page_title: "Event Calendar:",
        btn_add: "Add Event",
        clear_filter: "Show All Events",
        modal_add_title: "Add New Event",
        modal_edit_title: "Edit Event",
        label_heading: "Event Title",
        label_start: "Start Date & Time",
        label_end: "End Date & Time",
        label_content: "Description",
        placeholder_heading: "Write the event title here...",
        placeholder_content: "Write the event description details here...",
        btn_cancel: "Cancel",
        btn_save: "Save Event",
        no_content: "No events scheduled.",
        confirm_delete: "Are you sure you want to delete this event?",
        alert_missing: "Please fill out at least heading, description and date."
    };

    let eventsData = []; 
    let currentEditId = null; 
    let selectedDateFilter = null; 
    let calendarDate = new Date(2026, 5, 1); 
    let fpInstance = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const langBadge = document.getElementById('currentLanguageLabel');
            if (langBadge) {
                langBadge.innerText = currentLang.toUpperCase();
            }

            setupUI();
            loadPageContent();
        } else {
            window.location.href = 'login.html';
        }
    });

    function setupUI() {
        if (isAdmin) {
            const addBtn = document.getElementById('addEventBtn');
            if (addBtn) addBtn.classList.remove('hidden');
            setupAdminEventListeners();
            initFlatpickrLogic(); 
        }
        
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() + 1);
            renderCalendar();
        });
        document.getElementById('clearFilterBtn').addEventListener('click', () => {
            selectedDateFilter = null;
            document.getElementById('clearFilterBtn').classList.add('hidden');
            renderCalendar();
            const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');
            renderEventsList(cachedUi);
        });
    }

    function initFlatpickrLogic() {
        const radios = document.querySelectorAll('input[name="dateType"]');
        buildFlatpickr("single");

        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                buildFlatpickr(e.target.value);
            });
        });
    }

    function buildFlatpickr(type, defaultDates = []) {
        if (fpInstance) fpInstance.destroy();

        const label = document.getElementById('datePickerLabel');
        if (!label) return;
        
        if (type === "single") {
            label.innerText = "Select Date & Time";
            fpInstance = flatpickr("#flatpickrInput", {
                enableTime: true,
                time_24hr: true,
                dateFormat: "Y-m-d H:i",
                mode: "single",
                disableMobile: "true",
                defaultDate: defaultDates[0] || null
            });
        } else {
            label.innerText = "Select Time Range (Click Start- and End-Day)";
            fpInstance = flatpickr("#flatpickrInput", {
                enableTime: true,
                time_24hr: true,
                dateFormat: "Y-m-d H:i",
                mode: "range",
                disableMobile: "true",
                defaultDate: defaultDates
            });
        }
    }

    async function loadPageContent() {
        try {
            const uiTranslations = await getStaticUITranslations(currentLang);
            applyStaticTranslations(uiTranslations);

            eventsData = [];
            const docRef = doc(db, "app_content", "calendar_page");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists() && docSnap.data().events) {
                eventsData = docSnap.data().events;
            }

            eventsData.sort((a, b) => new Date(a.start) - new Date(b.start));
            await verifyAndGenerateEventTranslations();

            renderCalendar();
            renderEventsList(uiTranslations);
        } catch (e) {
            console.error("Critical error loading calendar page:", e);
            // Fallback-Rendering bei Crash, damit UI bedienbar bleibt
            const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');
            renderCalendar();
            renderEventsList(cachedUi);
        } finally {
            // SICHERHEITSNETZ: Macht die Seite unter allen Umständen sichtbar
            document.body.style.display = 'flex';
        }
    }

    async function verifyAndGenerateEventTranslations() {
        if (currentLang === 'en') return;
        let hasNewTranslations = false;

        try {
            for (let ev of eventsData) {
                if (!ev.translations) ev.translations = {};
                
                if (!ev.translations[currentLang] || !ev.translations[currentLang].title) {
                    const transTitle = await callTranslationAPI(ev.title, currentLang);
                    const transText = await callTranslationAPI(ev.text, currentLang);
                    
                    if (transTitle !== "__FAILED__" && transText !== "__FAILED__") {
                        ev.translations[currentLang] = { title: transTitle, text: transText };
                        hasNewTranslations = true;
                    }
                }
            }

            if (hasNewTranslations) {
                await setDoc(doc(db, "app_content", "calendar_page"), { events: eventsData }, { merge: true });
            }
        } catch (e) {
            console.error("Error in event translation engine:", e);
        }
    }

    function renderCalendar() {
        const monthYearLabel = document.getElementById('calendarMonthYear');
        const daysGrid = document.getElementById('calendarDaysGrid');
        if (!daysGrid || !monthYearLabel) return;
        
        daysGrid.innerHTML = '';

        const year = calendarDate.getFullYear();
        const month = calendarDate.getMonth();

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        monthYearLabel.innerText = `${monthNames[month]} ${year}`;

        let firstDayIndex = new Date(year, month, 1).getDay() - 1;
        if (firstDayIndex < 0) firstDayIndex = 6;

        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const blank = document.createElement('div');
            daysGrid.appendChild(blank);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayCell = document.createElement('div');
            dayCell.className = "py-2 rounded-lg cursor-pointer hover:bg-primary/10 flex flex-col items-center justify-center relative transition-all min-h-[40px]";
            
            const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            dayCell.innerHTML = `<span>${day}</span>`;

            const hasEvent = eventsData.some(ev => {
                const evStart = ev.start.split('T')[0];
                const evEnd = ev.end ? ev.end.split('T')[0] : evStart;
                return dayStr >= evStart && dayStr <= evEnd;
            });

            if (hasEvent) {
                const dot = document.createElement('span');
                dot.className = "w-1.5 h-1.5 bg-primary rounded-full absolute bottom-1";
                dayCell.appendChild(dot);
            }

            if (selectedDateFilter === dayStr) {
                dayCell.classList.add('bg-primary', 'text-white', 'hover:bg-primary-container');
                const dotElement = dayCell.querySelector('.rounded-full');
                if (dotElement) {
                    dotElement.classList.replace('bg-primary', 'bg-white');
                }
            }

            dayCell.addEventListener('click', () => {
                selectedDateFilter = dayStr;
                const clearBtn = document.getElementById('clearFilterBtn');
                if (clearBtn) clearBtn.classList.remove('hidden');
                renderCalendar();
                const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');
                renderEventsList(cachedUi);
            });

            daysGrid.appendChild(dayCell);
        }
    }

    function renderEventsList(uiTranslations) {
        const container = document.getElementById('eventsContainer');
        if (!container) return;
        container.innerHTML = '';

        let filteredEvents = eventsData;
        if (selectedDateFilter) {
            filteredEvents = eventsData.filter(ev => {
                const evStart = ev.start.split('T')[0];
                const evEnd = ev.end ? ev.end.split('T')[0] : evStart;
                return selectedDateFilter >= evStart && selectedDateFilter <= evEnd;
            });
        }

        if (filteredEvents.length === 0) {
            const fallbackText = uiTranslations["no_content"] || uiMaster.no_content;
            container.innerHTML = `<p class="text-sm text-on-surface-variant/70 italic text-center py-12">${fallbackText}</p>`;
            return;
        }

        filteredEvents.forEach((ev) => {
            const displayTitle = (currentLang === 'en') ? ev.title : (ev.translations?.[currentLang]?.title || ev.title);
            const displayText = (currentLang === 'en') ? ev.text : (ev.translations?.[currentLang]?.text || ev.text);

            const startFormatted = formatDateTimeString(ev.start);
            const endFormatted = ev.end ? formatDateTimeString(ev.end) : null;
            const timeBadgeString = endFormatted ? `${startFormatted} ➜ ${endFormatted}` : startFormatted;

            const card = document.createElement('div');
            card.className = "bg-white border border-outline-variant/60 rounded-xl p-4 md:p-6 shadow-sm relative group transition-all flex flex-col md:flex-row md:items-start gap-4 pt-14 md:pt-6";
            
            let adminControlsHtml = '';
            if (isAdmin) {
                adminControlsHtml = `
                    <div class="absolute top-3 right-3 flex items-center gap-1 bg-gray-50 p-1 rounded-lg border border-outline-variant/40 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity z-10">
                        <button onclick="window.openEditModal('${ev.id}')" class="p-2 hover:text-blue-600 transition-colors text-gray-500 flex items-center min-h-[36px]">
                            <span class="material-symbols-outlined text-lg">edit</span>
                        </button>
                        <button onclick="window.deleteEvent('${ev.id}')" class="p-2 hover:text-error transition-colors text-gray-500 flex items-center min-h-[36px]">
                            <span class="material-symbols-outlined text-lg">delete</span>
                        </button>
                    </div>
                `;
            }

            card.innerHTML = `
                ${adminControlsHtml}
                <div class="flex-1 space-y-2">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="bg-primary/10 text-primary text-[11px] md:text-xs font-bold px-2.5 py-1 rounded-md flex items-center gap-1">
                            <span class="material-symbols-outlined text-xs">schedule</span>
                            ${timeBadgeString}
                        </span>
                    </div>
                    <h2 class="font-headline-md text-base md:text-lg font-bold text-primary pr-0 md:pr-16 break-words">${displayTitle}</h2>
                    <p class="text-xs md:text-sm text-on-surface-variant leading-relaxed whitespace-pre-wrap break-words">${displayText}</p>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function formatDateTimeString(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        return d.toLocaleString(currentLang === 'de' ? 'de-DE' : 'en-NZ', {
            day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit'
        });
    }

    function setupAdminEventListeners() {
        const modal = document.getElementById('eventModal');
        if (!modal) return;
        
        const closeToggle = () => { modal.classList.add('hidden'); };
        
        document.getElementById('addEventBtn').addEventListener('click', () => {
            currentEditId = null;
            const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');
            document.getElementById('modalTitle').innerText = cachedUi['modal_add_title'] || uiMaster.modal_add_title;
            
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputText').value = '';
            
            const singleRadio = document.querySelector('input[name="dateType"][value="single"]');
            if (singleRadio) singleRadio.checked = true;
            buildFlatpickr("single");
            
            modal.classList.remove('hidden');
        });

        document.getElementById('closeModalBtn').addEventListener('click', closeToggle);
        document.getElementById('closeModalMobileBtn').addEventListener('click', closeToggle);

        document.getElementById('saveEventBtn').addEventListener('click', async () => {
            const title = document.getElementById('inputTitle').value.trim();
            const text = document.getElementById('inputText').value.trim();
            const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');

            if (!fpInstance || fpInstance.selectedDates.length === 0) {
                alert(cachedUi['alert_missing'] || uiMaster.alert_missing);
                return;
            }

            const selectedDates = fpInstance.selectedDates;
            
            if (!title || !text) {
                alert(cachedUi['alert_missing'] || uiMaster.alert_missing);
                return;
            }

            const formatDateToISO = (date) => {
                const tzOffset = date.getTimezoneOffset() * 60000; 
                return (new Date(date.getTime() - tzOffset)).toISOString().slice(0, 16);
            };

            let startISO = formatDateToISO(selectedDates[0]);
            let endISO = null;

            const checkedType = document.querySelector('input[name="dateType"]:checked');
            if (checkedType && checkedType.value === "range" && selectedDates.length > 1) {
                endISO = formatDateToISO(selectedDates[1]);
            }

            if (currentEditId) {
                const index = eventsData.findIndex(ev => ev.id === currentEditId);
                if (index !== -1) {
                    eventsData[index] = {
                        id: currentEditId,
                        title, start: startISO, end: endISO, text,
                        translations: eventsData[index].translations || {}
                    };
                }
            } else {
                const newId = 'ev_' + Math.random().toString(36).substring(2, 11);
                eventsData.push({
                    id: newId,
                    title, start: startISO, end: endISO, text,
                    translations: {}
                });
            }

            try {
                await setDoc(doc(db, "app_content", "calendar_page"), { events: eventsData });
                modal.classList.add('hidden');
                await loadPageContent();
            } catch(e) {
                console.error("Error with saving event:", e);
            }
        });
    }

    window.openEditModal = function(id) {
        currentEditId = id;
        const target = eventsData.find(ev => ev.id === id);
        if (!target) return;

        const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');
        document.getElementById('modalTitle').innerText = cachedUi['modal_edit_title'] || uiMaster.modal_edit_title;
        
        document.getElementById('inputTitle').value = target.title;
        document.getElementById('inputText').value = target.text;
        
        if (target.end) {
            const rangeRadio = document.querySelector('input[name="dateType"][value="range"]');
            if (rangeRadio) rangeRadio.checked = true;
            buildFlatpickr("range", [new Date(target.start), new Date(target.end)]);
        } else {
            const singleRadio = document.querySelector('input[name="dateType"][value="single"]');
            if (singleRadio) singleRadio.checked = true;
            buildFlatpickr("single", [new Date(target.start)]);
        }
        
        document.getElementById('eventModal').classList.remove('hidden');
    };

    window.deleteEvent = async function(id) {
        const cachedUi = JSON.parse(localStorage.getItem('cachedUiTexts') || '{}');
        if (!confirm(cachedUi['confirm_delete'] || uiMaster.confirm_delete)) return;
        
        eventsData = eventsData.filter(ev => ev.id !== id);

        try {
            await setDoc(doc(db, "app_content", "calendar_page"), { events: eventsData });
            await loadPageContent();
        } catch(e) {
            console.error("Error with deleting event:", e);
        }
    };

    async function callTranslationAPI(text, targetLang) {
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${targetLang.toLowerCase()}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("API Error");
            
            const data = await response.json();
            if (data.responseData && data.responseData.translatedText) {
                return data.responseData.translatedText;
            }
        } catch (err) {
            console.error("Translation API Error:", err.message);
        }
        return "__FAILED__"; 
    }

    async function getStaticUITranslations(lang) {
        if (lang === 'en') {
            localStorage.setItem('cachedUiTexts', JSON.stringify(uiMaster));
            return uiMaster;
        }

        const docRef = doc(db, "app_content", "calendar_ui_texts");
        let existingData = {};
        
        try {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) existingData = docSnap.data();
        } catch (e) { console.warn("Could not read UI texts:", e.message); }

        let missingKeys = Object.keys(uiMaster).filter(key => !existingData[key] || !existingData[key][lang]);

        if (missingKeys.length === 0) {
            let flattened = {};
            Object.keys(uiMaster).forEach(key => { flattened[key] = existingData[key][lang]; });
            localStorage.setItem('cachedUiTexts', JSON.stringify(flattened));
            return flattened;
        }

        let tempTranslations = { ...existingData };
        let hasNew = false;

        for (let key of missingKeys) {
            const translatedText = await callTranslationAPI(uiMaster[key], lang);
            if (translatedText !== "__FAILED__") {
                if (!tempTranslations[key]) tempTranslations[key] = {};
                tempTranslations[key][lang] = translatedText;
                tempTranslations[key]['en'] = uiMaster[key];
                hasNew = true;
            }
        }

        if (hasNew) {
            try { await setDoc(docRef, tempTranslations, { merge: true }); } catch (de) {}
        }

        let flattened = {};
        Object.keys(uiMaster).forEach(key => { flattened[key] = tempTranslations[key]?.[lang] || uiMaster[key]; });
        localStorage.setItem('cachedUiTexts', JSON.stringify(flattened));
        return flattened;
    }

    function applyStaticTranslations(data) {
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (data[key]) el.innerText = data[key];
        });

        document.querySelectorAll('[data-translate-placeholder]').forEach(el => {
            const key = el.getAttribute('data-translate-placeholder');
            if (data[key]) el.setAttribute('placeholder', data[key]);
        });
    }
</script>
</body>

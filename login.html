<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login | International Student App</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Auf Mobile machen wir das Glas-Panel etwas weniger transparent (0.9), damit die Formular-Inhalte über dem Bild perfekt lesbar sind */
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        @media (min-width: 1024px) {
            /* Auf dem PC (ab lg) entfernen wir den Glaseffekt, damit es exakt wie im Original aussieht */
            .glass-panel { background: #ffffff; backdrop-filter: none; -webkit-backdrop-filter: none; }
        }
        .academic-gradient { background: linear-gradient(135deg, #003527 0%, #064e3b 100%); }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-container": "#733100", "surface-variant": "#e0e3e5", "tertiary": "#502000",
                      "on-primary-fixed-variant": "#0b513d", "on-tertiary-fixed": "#331200", "on-surface": "#191c1e",
                      "inverse-primary": "#95d3ba", "secondary-fixed-dim": "#9bccf6", "primary-fixed-dim": "#95d3ba",
                      "surface-container-low": "#f2f4f6", "tertiary-fixed-dim": "#ffb68e", "tertiary-fixed": "#ffdbca",
                      "secondary-container": "#a3d4ff", "on-tertiary": "#ffffff", "surface-container-lowest": "#ffffff",
                      "on-primary": "#ffffff", "on-background": "#191c1e", "error-container": "#ffdad6",
                      "outline": "#707974", "primary": "#003527", "surface-container": "#eceef0",
                      "on-secondary-fixed": "#001e30", "surface-container-highest": "#e0e3e5", "surface-bright": "#f7f9fb",
                      "primary-container": "#064e3b", "on-error": "#ffffff", "error": "#ba1a1a",
                      "surface-tint": "#2b6954", "on-secondary": "#ffffff", "surface-dim": "#d8dadc",
                      "on-error-container": "#93000a", "secondary": "#2f6388", "surface": "#f7f9fb",
                      "on-surface-variant": "#404944", "on-tertiary-fixed-variant": "#763300", "inverse-on-surface": "#eff1f3",
                      "primary-fixed": "#b0f0d6", "secondary-fixed": "#cbe6ff", "on-primary-fixed": "#002117",
                      "inverse-surface": "#2d3133", "background": "#f7f9fb", "outline-variant": "#bfc9c3",
                      "on-secondary-fixed-variant": "#0e4b6f", "on-tertiary-container": "#ff985a",
                      "surface-container-high": "#e6e8ea", "on-primary-container": "#80bea6", "on-secondary-container": "#275c81"
              },
              "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
              "spacing": { "gutter-mobile": "16px", "margin-desktop": "64px", "unit": "8px", "margin-mobile": "20px", "tile-gap": "16px", "gutter-desktop": "24px" },
              "fontFamily": { "body-md": ["Inter"], "headline-lg": ["Montserrat"], "headline-lg-mobile": ["Montserrat"], "label-sm": ["Inter"], "body-lg": ["Inter"], "headline-md": ["Montserrat"], "display-lg": ["Montserrat"], "label-md": ["Inter"] },
              "fontSize": { "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}], "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}], "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}], "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}], "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}], "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}], "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}], "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}] }
            },
          },
        }
    </script>
</head>
<body class="academic-gradient flex flex-col min-h-screen relative">

    <div class="absolute inset-0 opacity-30 lg:opacity-40 mix-blend-overlay z-0 pointer-events-none">
        <img class="w-full h-full object-cover" src="whs.jpg" alt="Campus">
    </div>

<main class="flex-grow flex flex-col lg:flex-row min-h-screen w-full relative z-10">
    <section class="hidden lg:flex lg:w-1/2 relative items-center justify-center p-margin-desktop">
        <div class="relative z-10 text-white max-w-lg">
            <h1 class="font-display-lg text-display-lg mb-6 leading-tight">Welcome to the Westland High International Student App</h1>
        </div>
    </section>

    <section class="flex-1 flex flex-col justify-center items-center px-4 py-8 md:p-margin-desktop bg-transparent lg:bg-surface">
        <div class="w-full max-w-md mx-auto">
            <div class="lg:hidden flex flex-col items-center mb-8">
                <div class="w-14 h-14 bg-white/10 border border-white/20 backdrop-blur-md rounded-xl flex items-center justify-center mb-3 shadow-xl">
                    <span class="material-symbols-outlined text-white text-2xl" data-icon="account_balance">account_balance</span>
                </div>
                <h2 class="text-xl font-bold tracking-wide text-white">International Student App</h2>
            </div>
            
            <div class="p-6 md:p-10 rounded-2xl shadow-2xl border border-outline-variant/30 lg:border-outline-variant glass-panel mx-2">
                <div class="mb-6">
                    <h2 class="text-2xl md:text-headline-md font-bold text-on-surface mb-1.5">Sign In</h2>
                    <p class="text-sm md:text-body-md text-on-surface-variant">Access your information and resources.</p>
                    <p id="errorMessage" class="text-error text-label-sm mt-2 hidden"></p>
                </div>
                
                <form id="loginForm" class="space-y-5">
                    <div class="space-y-1.5">
                        <label class="block text-xs md:text-label-md font-medium text-on-surface-variant" for="email">School Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl" data-icon="mail">mail</span>
                            <input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-on-surface text-sm md:text-base" id="email" required type="email" placeholder="username@westland.school.nz">
                        </div>
                    </div>
                    
                    <div class="space-y-1.5 relative">
                        <!-- Infobox direkt über dem Label-Bereich plaziert -->
                        <div id="forgotInfo" class="hidden absolute bottom-full left-0 right-0 mb-2 bg-secondary-container text-on-secondary-container text-xs font-medium px-3 py-2 rounded-lg border border-secondary/20 shadow-md flex items-center gap-2 animate-fade-in">
                            <span class="material-symbols-outlined text-base flex-shrink-0">info</span>
                            <span>Please ask the International Student Coordinator to get your password.</span>
                        </div>

                        <div class="flex justify-between items-center">
                            <label class="block text-xs md:text-label-md font-medium text-on-surface-variant" for="password">Password</label>
                            <!-- Klick-Event hinzugefügt -->
                            <a id="btnForgot" class="text-xs font-medium text-secondary hover:underline transition-all cursor-pointer" href="javascript:void(0)">Forgot?</a>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl" data-icon="lock">lock</span>
                            <input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-on-surface text-sm md:text-base" id="password" required type="password" placeholder="••••••••">
                        </div>
                    </div>
                    <button class="w-full py-3.5 bg-primary text-white font-semibold text-base md:text-headline-md rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit" id="submitBtn">
                        Sign In <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBZVrxD26WJDlK5_zB3LOMX32l6BzlC34Y",
        authDomain: "whsinternational.firebaseapp.com",
        projectId: "whsinternational",
        storageBucket: "whsinternational.firebasestorage.app",
        messagingSenderId: "940437937286",
        appId: "1:940437937286:web:06c74c7e287e50b511c507",
        measurementId: "G-W6P03BPPV7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');
        const errEl = document.getElementById('errorMessage');

        btn.disabled = true;
        btn.innerText = "Authenticating...";
        errEl.classList.add('hidden');

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            const userDocRef = doc(db, "users", user.uid);
            const userDocSnap = await getDoc(userDocRef);

            if (userDocSnap.exists()) {
                const userData = userDocSnap.data();
                
                localStorage.setItem('userRole', userData.role);
                localStorage.setItem('userName', userData.name);
                localStorage.setItem('userLanguage', userData.language || 'en');
                
                if (userData.role === "admin") {
                    const globalDocRef = doc(db, "system_settings", "global");
                    const globalDocSnap = await getDoc(globalDocRef);
                    if (globalDocSnap.exists()) {
                        localStorage.setItem('portalActive', globalDocSnap.data().reportActive);
                    }
                }
            }

            window.location.href = 'index.html'; 

        } catch (error) {
            errEl.innerText = "Login failed: " + error.message;
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = 'Sign In <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>';
        }
    });
</script>

<script>
    function toggleLang() { document.getElementById('lang-dropdown').classList.toggle('hidden'); }

    // Steuerung für das Info-Badge
    document.getElementById('btnForgot').addEventListener('click', function(e) {
        e.preventDefault();
        const infoBox = document.getElementById('forgotInfo');
        infoBox.classList.toggle('hidden');
    });
</script>
</body>
</html>

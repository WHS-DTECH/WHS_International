<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Student Management | International Student App</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#003527",
                        "primary-container": "#064e3b",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#404944",
                        "outline-variant": "#bfc9c3",
                        "error": "#ba1a1a",
                        "background": "#f7f9fb"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="text-on-surface flex flex-col min-h-screen">

<header class="w-full flex justify-between items-center px-4 md:px-16 py-4 bg-white border-b border-outline-variant sticky top-0 z-50 gap-2">
    <div class="flex items-center gap-4 min-w-0">
        <span class="font-headline-md text-lg md:text-xl font-bold text-primary truncate">International Student App</span>
    </div>
    
    <div class="flex items-center gap-3 md:gap-6 flex-shrink-0">
        <a href="index.html" class="text-xs md:text-sm font-medium text-on-surface-variant hover:text-primary flex items-center gap-1 transition-colors">
            <span class="material-symbols-outlined text-base">arrow_back</span>
            <span class="hidden sm:inline">Back to Dashboard</span>
        </a>
        <div id="currentLanguageLabel" class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-on-surface-variant bg-slate-100 border border-slate-200 px-2 py-1 rounded-lg cursor-pointer hover:bg-slate-200 hover:text-primary transition-all">
            --
        </div>
        
        <div class="flex items-center gap-2">
            <span id="adminName" class="hidden"></span>
            <span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary text-2xl" style="font-variation-settings: 'FILL' 1">account_circle</span>
        </div>
    </div>
</header>

<main class="flex-1 max-w-4xl w-full mx-auto px-4 md:px-6 py-6 md:py-12">
    
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 md:mb-10 border-b border-slate-200 pb-6">
        <div class="min-w-0">
            <h1 class="font-headline-lg text-2xl md:text-3xl font-bold text-primary tracking-tight flex items-center gap-2 md:gap-3">
                <span class="material-symbols-outlined text-2xl md:text-3xl">group</span>
                <span class="truncate">Student Management</span>
            </h1>
            <p class="text-slate-500 text-xs md:text-sm mt-1">Create new student accounts, view login credentials, manage access.</p>
        </div>
        
        <button onclick="openModal()" class="w-full sm:w-auto flex items-center justify-center gap-2 px-5 py-3 bg-primary text-white text-sm font-semibold rounded-xl shadow-sm hover:bg-primary-container transition-all h-12 flex-shrink-0">
            <span class="material-symbols-outlined text-lg">person_add</span>
            <span>Add New Student</span>
        </button>
    </div>

    <div class="space-y-4" id="studentsList">
        <p class="text-center text-slate-400 py-8 text-sm">Searching students in the database...</p>
    </div>
</main>

<div id="addModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-md w-full p-5 md:p-8 shadow-xl border border-slate-100 animate-in fade-in zoom-in-95 duration-150 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg md:text-xl font-bold text-primary">Create Student Account</h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form id="addStudentForm" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">Student Name</label>
                <input id="newCardName" required type="text" placeholder="e.g. Lukas Müller" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm h-11">
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">School Email Address of Student</label>
                <input id="newCardEmail" required type="email" placeholder="username@westland.school.nz" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm h-11">
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">Password for Student Account</label>
                <input id="newCardPassword" required type="text" placeholder="Assign a secure password" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm h-11">
            </div>
            <button type="submit" class="w-full py-3 bg-primary text-white font-semibold rounded-xl shadow-md hover:bg-primary-container transition-all text-sm mt-4 h-11">
                Activate Account
            </button>
        </form>
    </div>
</div>

<footer class="w-full py-6 text-center text-xs text-on-surface-variant/70 space-y-1 mt-auto border-t border-slate-100 bg-white">
    <p>© 2026 Westland High School</p>
    <p>Hokitika, New Zealand</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBZVrxD26WJDlK5_zB3LOMX32l6BzlC34Y",
        authDomain: "whsinternational.firebaseapp.com",
        projectId: "whsinternational",
        storageBucket: "whsinternational.firebasestorage.app",
        messagingSenderId: "940437937286",
        appId: "1:940437937286:web:06c74c7e287e50b511c507",
        measurementId: "G-W6P03BPPV7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        const userRole = localStorage.getItem('userRole');
        const adminNameLocal = localStorage.getItem('userName');

        if (!user || userRole !== 'admin') {
            console.log("Unauthorized! Redirecting to login...");
            window.location.href = 'login.html';
        } else {
            document.getElementById('adminName').innerText = adminNameLocal;
            
            let cachedLang = localStorage.getItem('userLanguage');

            if (cachedLang) {
                const langBadge = document.getElementById('currentLanguageLabel');
                if (langBadge) langBadge.innerText = cachedLang.toUpperCase();
            } else {
                try {
                    const qAdmin = query(collection(db, "users"), where("email", "==", user.email));
                    const adminSnap = await getDocs(qAdmin);
                    
                    if (!adminSnap.empty) {
                        const adminData = adminSnap.docs[0].data();
                        const lang = adminData.language || 'en';
                        localStorage.setItem('userLanguage', lang);
                        const langBadge = document.getElementById('currentLanguageLabel');
                        if (langBadge) langBadge.innerText = lang.toUpperCase();
                    } else {
                        const langBadge = document.getElementById('currentLanguageLabel');
                        if (langBadge) langBadge.innerText = 'EN';
                    }
                } catch (langError) {
                    console.error("Fehler beim Laden der Admin-Sprache:", langError);
                    const langBadge = document.getElementById('currentLanguageLabel');
                    if (langBadge) langBadge.innerText = 'EN';
                }
            }

            renderStudents();
        }
    });

    async function renderStudents() {
        const listContainer = document.getElementById('studentsList');
        listContainer.innerHTML = '<p class="text-center text-slate-400 py-8 text-sm">Refreshing list...</p>';

        try {
            const q = query(collection(db, "users"), where("role", "==", "student"));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                listContainer.innerHTML = '<p class="text-center text-slate-400 py-8 text-sm">No student accounts registered yet.</p>';
                return;
            }

            listContainer.innerHTML = '';

            querySnapshot.forEach((documentObj) => {
                const data = documentObj.data();
                const id = documentObj.id;
                
                const card = document.createElement('div');
                card.className = `bg-white border ${data.isActive ? 'border-slate-200' : 'border-red-200 bg-red-50/20'} rounded-2xl p-4 md:p-6 shadow-sm flex flex-col sm:flex-row justify-between sm:items-center gap-4`;
                
                card.innerHTML = `
                    <div class="space-y-1.5 min-w-0 w-full sm:w-auto">
                        <div class="flex flex-wrap items-center gap-2">
                            <h4 class="font-bold text-slate-800 text-base break-words max-w-full">${data.name}</h4>
                            ${data.isActive 
                                ? '<span class="px-2 py-0.5 text-[10px] font-bold bg-emerald-100 text-emerald-700 rounded-full flex-shrink-0">ACTIVE</span>' 
                                : '<span class="px-2 py-0.5 text-[10px] font-bold bg-red-100 text-red-700 rounded-full flex-shrink-0">DISABLED</span>'}
                        </div>
                        <p class="text-xs text-slate-500 font-medium flex items-center gap-1 break-all">
                            <span class="material-symbols-outlined text-sm flex-shrink-0">mail</span> ${data.email}
                        </p>
                        <p class="text-xs text-slate-400 font-mono mt-1 bg-slate-50 px-2 py-1 rounded border border-slate-100 inline-block break-all">
                            Password: ${data.password || '********'}
                        </p>
                    </div>
                    
                    <div id="btn-zone-${id}" class="w-full sm:w-auto flex-shrink-0">
                        ${data.isActive ? `
                            <button onclick="confirmDelete('${id}')" class="w-full sm:w-auto text-center text-xs text-red-600 font-semibold border border-red-200 hover:bg-red-50 px-4 py-2.5 rounded-xl transition-all touch-manipulation min-h-[40px]">
                                Disable Account
                            </button>
                        ` : `
                            <span class="text-xs text-slate-400 italic block sm:inline text-left sm:text-right">Access Revoked</span>
                        `}
                    </div>
                `;
                listContainer.appendChild(card);
            });
        } catch (err) {
            console.error("Error fetching documents: ", err);
            listContainer.innerHTML = '<p class="text-center text-error py-8 text-sm">Error loading data. Please refresh the page.</p>';
        }
    }

    document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('newCardName').value;
        const email = document.getElementById('newCardEmail').value;
        const password = document.getElementById('newCardPassword').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.innerText = "Creating Account...";

        try {
            // deleteApp aus dem Hauptpaket importieren
            const { initializeApp: initSecondaryApp, deleteApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
            const { getAuth: getSecondaryAuth, createUserWithEmailAndPassword: createSecondaryUser, signOut: secondarySignOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
            
            // Temporäre App initialisieren
            const secondaryApp = initSecondaryApp(firebaseConfig, "SecondaryApp");
            const secondaryAuth = getSecondaryAuth(secondaryApp);

            const userCredential = await createSecondaryUser(secondaryAuth, email, password);
            const generatedUid = userCredential.user.uid;

            // Dokument über die primäre Admin-Verbindung in Firestore speichern
            await setDoc(doc(db, "users", generatedUid), {
                name: name,
                email: email,
                password: password,
                role: "student",
                isActive: true,
                language: "en"
            });

            // Session ausloggen und die temporäre App sauber entfernen
            await secondarySignOut(secondaryAuth);
            await deleteApp(secondaryApp); // Korrekte v10 Syntax

            document.getElementById('addStudentForm').reset();
            closeModal();
            renderStudents(); 
            
            alert(`Success: Account for ${name} has been created and is ready for use!`);
        } catch (error) {
            console.error("Error during creation:", error);
            alert("Error: " + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Activate Account";
        }
    });

    window.confirmDelete = function(id) {
        const zone = document.getElementById(`btn-zone-${id}`);
        zone.innerHTML = `
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <span class="text-xs font-bold text-error w-full sm:w-auto mb-1 sm:mb-0">Really disable?</span>
                <button onclick="executeSperre('${id}')" class="flex-1 sm:flex-none justify-center bg-error text-white text-xs px-4 py-2.5 rounded-lg font-bold hover:bg-red-700 transition-all min-h-[40px]">Yes</button>
                <button onclick="cancelDelete('${id}')" class="flex-1 sm:flex-none justify-center bg-slate-200 text-slate-700 text-xs px-4 py-2.5 rounded-lg font-bold hover:bg-slate-300 transition-all min-h-[40px]">No</button>
            </div>
        `;
    }

    window.cancelDelete = function(id) {
        renderStudents();
    }

    window.executeSperre = async function(id) {
        try {
            const userRef = doc(db, "users", id);
            await updateDoc(userRef, {
                isActive: false,
                email: "Blocked_" + Math.random().toString(36).substring(5) + "@disabled.com",
                password: "DISABLED_BY_ADMIN_" + Math.random().toString(36).substring(5)
            });
            renderStudents();
        } catch (error) {
            alert("Error disabling profile: " + error.message);
        }
    }
</script>

<script>
    function openModal() { document.getElementById('addModal').classList.replace('hidden', 'flex'); }
    function closeModal() { document.getElementById('addModal').classList.replace('flex', 'hidden'); }
</script>

</body>
</html>
